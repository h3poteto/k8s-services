---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-env
spec:
  refreshInterval: 3m
  secretStoreRef:
    name: aws-secret-manager
    kind: ClusterSecretStore
  target:
    name: db-env
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: "/external-prd/pleromaio/pleromaio-env"
        property: DB_HOST
    - secretKey: DB_USER
      remoteRef:
        key: "/external-prd/pleromaio/pleromaio-env"
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "/external-prd/pleromaio/pleromaio-env"
        property: DB_PASSWORD

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: masudastream-db-env
spec:
  refreshInterval: 3m
  secretStoreRef:
    name: aws-secret-manager
    kind: ClusterSecretStore
  target:
    name: masudastream-db-env
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: "/external-prd/masudastream/masudastream-env"
        property: DB_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "/external-prd/masudastream/masudastream-env"
        property: DB_PASSWORD

