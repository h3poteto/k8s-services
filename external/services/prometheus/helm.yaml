---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
spec:
  interval: 1m
  targetNamespace: monitoring
  chart:
    spec:
      chart: prometheus
      version: '28.16.0'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1m
  values:
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    server:
      service:
        type: NodePort
        nodePort: 30001
      persistentVolume:
        enabled: false
      resources:
        requests:
          cpu: 200m
          memory: 1500Mi
        limits:
          memory: 2000Mi
